<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Report{% endblock %}</title>
    <link rel="stylesheet" href="{{ base_url }}/css/style.css">
    <script>window.SITE_BASE_URL = "{{ base_url }}";</script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ base_url }}/" class="logo">AI Report</a>
            <div class="nav-links">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/categories/">Categories</a>
                <a href="{{ base_url }}/search.html">Search</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>AI Report - Daily AI News & Research Summary</p>
            <p class="generated-at">Generated: {{ generated_at[:10] if generated_at else '' }}</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
