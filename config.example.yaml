# AI Report Automation Service - 설정 파일 예시
# 이 파일을 config.yaml로 복사하여 사용하세요.

# Anthropic (Claude) API 설정
anthropic:
  # 환경 변수에서 읽기: ${ANTHROPIC_API_KEY}
  # 또는 직접 입력 (권장하지 않음)
  api_key: ${ANTHROPIC_API_KEY}

  # 사용할 모델
  model: claude-sonnet-4-20250514

# Slack 설정
slack:
  # Incoming Webhook URL
  # Slack App 설정에서 생성: https://api.slack.com/messaging/webhooks
  webhook_url: ${SLACK_WEBHOOK_URL}

# Discord 설정
discord:
  # Discord Webhook URL
  # 서버 설정 > 연동 > 웹훅에서 생성
  webhook_url: ${DISCORD_WEBHOOK_URL}

# 수집기 설정
collectors:
  # arXiv 논문 수집
  arxiv:
    enabled: true
    # 수집할 카테고리 (https://arxiv.org/category_taxonomy)
    categories:
      - cs.AI   # Artificial Intelligence
      - cs.LG   # Machine Learning
      - cs.CL   # Computation and Language

  # Google AI 블로그 수집
  google_blog:
    enabled: true

  # Anthropic 블로그 수집
  anthropic_blog:
    enabled: true

  # 소스 비활성화 (Phase 9.2)
  # Source enum value를 나열하면 해당 수집기가 꺼집니다.
  # 빈 리스트면 기본값(meta_ai, lg_ai_research)만 비활성화.
  # 모든 Source enum value: arxiv, google, anthropic, openai, huggingface,
  #   korean, microsoft_research, nvidia, marktechpost, bair, stanford_ai,
  #   techcrunch, venturebeat, hf_papers, meta_ai, mit_tech_review,
  #   naver_d2, kakao_tech, lg_ai_research
  # disabled_sources:
  #   - techcrunch
  #   - venturebeat
  #   - meta_ai
  #   - lg_ai_research

# 로깅 설정
logging:
  # 로그 레벨: DEBUG, INFO, WARNING, ERROR
  level: INFO

  # 로그 파일 경로 (null이면 파일 출력 안 함)
  # 파일 출력 시 JSON 형식으로 저장됨
  log_file: null
  # log_file: logs/ai-report.log

# 이메일 설정
email:
  # 이메일 알림 활성화 (기본: false)
  enabled: false

  # SMTP 서버 설정
  smtp_host: smtp.gmail.com
  smtp_port: 587
  use_tls: true

  # SMTP 인증
  # Gmail의 경우 2FA 활성화 후 앱 비밀번호 사용 권장
  username: ${EMAIL_USERNAME}
  password: ${EMAIL_PASSWORD}

  # 발신자 이메일 주소
  sender: ai-report@example.com

  # 수신자 목록 (또는 환경 변수 EMAIL_RECIPIENTS 사용)
  recipients:
    - user1@example.com
    - user2@example.com
