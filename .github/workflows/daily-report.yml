name: Daily AI Report

on:
  schedule:
    # 매일 UTC 00:00 (KST 09:00) 실행
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행 가능
    inputs:
      dry_run:
        description: 'Dry run (no Slack notification)'
        required: false
        default: 'false'
        type: boolean
      limit:
        description: 'Limit number of articles'
        required: false
        default: ''
        type: string

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate AI Report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Build command with options
          CMD="python -m src.main --use-api"

          # Add dry-run if requested
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            CMD="$CMD --dry-run"
          fi

          # Add limit if specified
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            CMD="$CMD --limit ${{ github.event.inputs.limit }}"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-report-${{ github.run_id }}
          path: data/
          retention-days: 30

  notify-on-failure:
    needs: generate-report
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send failure notification to Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "⚠️ AI Report 생성 실패",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ *AI Report 생성 실패*\n\n워크플로우 실행 중 오류가 발생했습니다.\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions에서 확인>"
                  }
                }
              ]
            }' \
            "$SLACK_WEBHOOK_URL"
