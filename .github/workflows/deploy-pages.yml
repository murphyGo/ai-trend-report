name: Deploy to GitHub Pages

on:
  # daily-report 워크플로우 완료 후 실행
  workflow_run:
    workflows: ["Daily AI Report"]
    types:
      - completed
  # 수동 실행
  workflow_dispatch:

# Node.js 24 사용 (deprecation 경고 해결)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# GitHub Pages 배포 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # daily-report가 성공했을 때만 실행 (또는 수동 실행)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # daily-report가 커밋한 최신 데이터 포함
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List available reports
        run: |
          echo "Available reports:"
          ls -la data/ || echo "No data directory"

      - name: Generate static site
        run: |
          if ls data/report_*.json 1> /dev/null 2>&1; then
            python -m src.main --generate-static --static-output _site
          else
            echo "No reports found, creating placeholder page"
            mkdir -p _site
            cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AI Report</title>
            <style>
              body { font-family: sans-serif; text-align: center; padding: 50px; }
              h1 { color: #2563eb; }
            </style>
          </head>
          <body>
            <h1>AI Report</h1>
            <p>아직 생성된 리포트가 없습니다.</p>
            <p>Daily Report 워크플로우가 실행되면 자동으로 업데이트됩니다.</p>
          </body>
          </html>
          EOF
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
