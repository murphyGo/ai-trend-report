name: Deploy to GitHub Pages

on:
  # daily-report 워크플로우 완료 후 실행
  workflow_run:
    workflows: ["Daily AI Report"]
    types:
      - completed
  # 수동 실행
  workflow_dispatch:

# GitHub Pages 배포 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # daily-report가 성공했을 때만 실행 (또는 수동 실행)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 최신 리포트 아티팩트 다운로드
      - name: Download latest report artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: daily-report.yml
          name: ai-report-*
          path: data/
          search_artifacts: true
          if_no_artifact_found: warn

      # 기존 data/ 폴더의 리포트도 포함
      - name: List available reports
        run: |
          echo "Available reports:"
          ls -la data/ || echo "No data directory"

      # 정적 사이트 생성
      - name: Generate static site
        run: python -m src.main --generate-static --static-output _site

      # GitHub Pages 아티팩트 업로드
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
